<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Traveller Android application preview</title>
  <desc id="desc">A phone showing Traveller's task entry field, save button, and incomplete task list.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e0f2fe"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <filter id="shadow" x="-30%" y="-20%" width="160%" height="160%"><feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.22"/></filter>
    <style>.text{font-family:Arial,sans-serif}</style>
  </defs>
  <rect width="1200" height="675" fill="url(#background)"/>
  <circle cx="1060" cy="110" r="190" fill="#0ea5e9" opacity="0.10"/>
  <circle cx="105" cy="610" r="170" fill="#22c55e" opacity="0.10"/>
  <g filter="url(#shadow)">
    <rect x="120" y="42" width="360" height="590" rx="52" fill="#111827"/>
    <rect x="145" y="92" width="310" height="495" rx="24" fill="#f8fafc"/>
    <rect x="145" y="92" width="310" height="64" rx="24" fill="#2563eb"/>
    <rect x="145" y="132" width="310" height="24" fill="#2563eb"/>
    <text x="176" y="133" class="text" fill="#fff" font-size="24" font-weight="700">Traveller</text>
    <rect x="170" y="184" width="184" height="46" rx="5" fill="#fff" stroke="#94a3b8"/>
    <text x="185" y="213" class="text" fill="#94a3b8" font-size="16">Add a task</text>
    <rect x="366" y="184" width="64" height="46" rx="5" fill="#2563eb"/>
    <text x="380" y="213" class="text" fill="#fff" font-size="15" font-weight="700">Save</text>
    <g class="text" font-size="17" fill="#1e293b">
      <rect x="170" y="260" width="260" height="58" rx="8" fill="#fff" stroke="#e2e8f0"/><text x="190" y="295">Book train tickets</text>
      <rect x="170" y="330" width="260" height="58" rx="8" fill="#fff" stroke="#e2e8f0"/><text x="190" y="365">Pack passport</text>
      <rect x="170" y="400" width="260" height="58" rx="8" fill="#fff" stroke="#e2e8f0"/><text x="190" y="435">Confirm hotel</text>
    </g>
    <circle cx="300" cy="68" r="6" fill="#475569"/>
  </g>
  <g class="text">
    <text x="610" y="210" fill="#0f172a" font-size="52" font-weight="800">Traveller</text>
    <text x="612" y="260" fill="#334155" font-size="24">A focused legacy Android task list.</text>
    <text x="612" y="320" fill="#64748b" font-size="19">Add incomplete travel tasks.</text>
    <text x="612" y="354" fill="#64748b" font-size="19">Tap a row to mark it complete.</text>
    <text x="612" y="388" fill="#64748b" font-size="19">Sync through the historical Parse backend.</text>
    <rect x="610" y="455" width="430" height="92" rx="18" fill="#0f172a"/>
    <text x="640" y="492" fill="#cbd5e1" font-size="16">Repository preview based on</text>
    <text x="640" y="522" fill="#38bdf8" font-size="18" font-weight="700">item_activity.xml</text>
  </g>
</svg>
